[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20.16.0"
  NPM_VERSION = "10.8.1"
  NEXT_TELEMETRY_DISABLED = "1"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Increase function timeout for heavy queries
[functions]
  included_files = ["**/*.js"]